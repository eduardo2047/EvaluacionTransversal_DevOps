
name: Build, Push and Deploy to Amazon EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "506701750346"
  EKS_CLUSTER_NAME: devopseks

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend
        run: |
          docker build -t tienda-backend ./backend
          docker tag tienda-backend:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-backend:latest

      - name: Push Backend
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-backend:latest

      - name: Build Frontend
        run: |
          docker build -t tienda-frontend ./frontend
          docker tag tienda-frontend:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-frontend:latest

      - name: Push Frontend
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-frontend:latest

      - name: Build Database
        run: |
          docker build -t tienda-db ./db
          docker tag tienda-db:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-db:latest

      - name: Push Database
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/tienda-db:latest

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Restart Deployments
        run: |
          kubectl rollout restart deployment tienda-backend -n tienda
          kubectl rollout restart deployment tienda-frontend -n tienda

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/tienda-backend -n tienda
          kubectl rollout status deployment/tienda-frontend -n tienda
